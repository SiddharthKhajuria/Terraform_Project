<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Terraform Project AWS Architecture Style Diagram</title>
  <desc id="desc">AWS style architecture for Terraform bootstrap backend and QA infrastructure with 2 public and 2 private EC2 instances.</desc>

  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a" />
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626" />
    </marker>

    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .cloudLabel { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .sectionLabel { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .nodeTitle { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .nodeSub { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .extLabel { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #1e3a8a; }
      .small { font: 500 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .iconText { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }

      .cloud { fill: #f8fafc; stroke: #334155; stroke-width: 2.5; rx: 16; ry: 16; }
      .external { fill: #f8fbff; stroke: #60a5fa; stroke-width: 2.5; stroke-dasharray: 8 6; rx: 14; ry: 14; }

      .sec-backend { fill: #f0fdf4; stroke: #65a30d; stroke-width: 2.5; rx: 14; ry: 14; }
      .sec-network { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 14; ry: 14; }
      .sec-compute { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; rx: 14; ry: 14; }
      .sec-orch { fill: #fdf2f8; stroke: #db2777; stroke-width: 2.5; rx: 14; ry: 14; }

      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 12; ry: 12; }
      .icon { rx: 8; ry: 8; }
      .tf { fill: #7c3aed; }
      .s3 { fill: #15803d; }
      .ddb { fill: #6d28d9; }
      .vpc { fill: #2563eb; }
      .sub { fill: #0284c7; }
      .sg { fill: #059669; }
      .ec2 { fill: #ea580c; }
      .mod { fill: #475569; }
      .out { fill: #0ea5e9; }

      .lineBlue { stroke: #2563eb; stroke-width: 2.6; fill: none; marker-end: url(#arrowBlue); }
      .lineGreen { stroke: #16a34a; stroke-width: 2.6; fill: none; marker-end: url(#arrowGreen); }
      .lineGray { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrowGray); }
      .lineRedDashed { stroke: #dc2626; stroke-width: 2.6; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowRed); }
    </style>
  </defs>

  <text x="900" y="38" text-anchor="middle" class="title">Terraform Project Architecture (AWS Style)</text>

  <rect x="20" y="225" width="220" height="290" class="external" />
  <text x="130" y="255" text-anchor="middle" class="extLabel">Operator</text>

  <g>
    <rect x="50" y="275" width="160" height="88" class="node" />
    <rect x="64" y="292" width="30" height="30" class="icon mod" />
    <text x="79" y="312" text-anchor="middle" class="iconText">OPS</text>
    <text x="105" y="311" class="nodeTitle">DevOps Engineer</text>
    <text x="105" y="333" class="nodeSub">Local machine</text>
  </g>

  <g>
    <rect x="50" y="390" width="160" height="96" class="node" />
    <rect x="64" y="409" width="30" height="30" class="icon tf" />
    <text x="79" y="429" text-anchor="middle" class="iconText">TF</text>
    <text x="105" y="427" class="nodeTitle">Terraform CLI</text>
    <text x="105" y="449" class="nodeSub">init / plan / apply</text>
  </g>

  <rect x="270" y="50" width="1500" height="910" class="cloud" />
  <text x="1020" y="84" text-anchor="middle" class="cloudLabel">AWS Cloud</text>

  <rect x="330" y="120" width="450" height="320" class="sec-backend" />
  <text x="555" y="150" text-anchor="middle" class="sectionLabel">State Backend (env/bootstrap)</text>

  <g>
    <rect x="360" y="190" width="175" height="95" class="node" />
    <rect x="374" y="209" width="32" height="32" class="icon tf" />
    <text x="390" y="230" text-anchor="middle" class="iconText">TF</text>
    <text x="415" y="226" class="nodeTitle">Bootstrap Terraform</text>
    <text x="415" y="248" class="nodeSub">env/bootstrap</text>
  </g>

  <g>
    <rect x="565" y="175" width="180" height="100" class="node" />
    <rect x="579" y="195" width="34" height="34" class="icon s3" />
    <text x="596" y="216" text-anchor="middle" class="iconText">S3</text>
    <text x="622" y="212" class="nodeTitle">S3 Bucket</text>
    <text x="622" y="234" class="nodeSub">Remote state</text>
  </g>

  <g>
    <rect x="565" y="295" width="180" height="100" class="node" />
    <rect x="579" y="315" width="34" height="34" class="icon ddb" />
    <text x="596" y="336" text-anchor="middle" class="iconText">DDB</text>
    <text x="622" y="332" class="nodeTitle">DynamoDB</text>
    <text x="622" y="354" class="nodeSub">State locking</text>
  </g>

  <rect x="820" y="120" width="440" height="430" class="sec-network" />
  <text x="1040" y="150" text-anchor="middle" class="sectionLabel">Network & Security</text>

  <g>
    <rect x="850" y="180" width="180" height="86" class="node" />
    <rect x="864" y="198" width="30" height="30" class="icon vpc" />
    <text x="879" y="218" text-anchor="middle" class="iconText">VPC</text>
    <text x="905" y="216" class="nodeTitle">VPC</text>
    <text x="905" y="238" class="nodeSub">10.0.0.0/16</text>
  </g>

  <g>
    <rect x="850" y="295" width="180" height="90" class="node" />
    <rect x="864" y="314" width="30" height="30" class="icon sub" />
    <text x="879" y="334" text-anchor="middle" class="iconText">PUB</text>
    <text x="905" y="332" class="nodeTitle">Public Subnet</text>
    <text x="905" y="354" class="nodeSub">10.0.101.0/24</text>
  </g>

  <g>
    <rect x="850" y="410" width="180" height="90" class="node" />
    <rect x="864" y="429" width="30" height="30" class="icon sub" />
    <text x="879" y="449" text-anchor="middle" class="iconText">PVT</text>
    <text x="905" y="447" class="nodeTitle">Private Subnet</text>
    <text x="905" y="469" class="nodeSub">10.0.1.0/24</text>
  </g>

  <g>
    <rect x="1050" y="295" width="180" height="90" class="node" />
    <rect x="1064" y="314" width="30" height="30" class="icon sg" />
    <text x="1079" y="334" text-anchor="middle" class="iconText">SG</text>
    <text x="1105" y="332" class="nodeTitle">qa-web-sg</text>
    <text x="1105" y="354" class="nodeSub">HTTP ingress</text>
  </g>

  <rect x="1300" y="120" width="430" height="430" class="sec-compute" />
  <text x="1515" y="150" text-anchor="middle" class="sectionLabel">EC2 Runtime</text>

  <g>
    <rect x="1330" y="220" width="370" height="110" class="node" />
    <rect x="1344" y="244" width="34" height="34" class="icon ec2" />
    <text x="1361" y="265" text-anchor="middle" class="iconText">EC2</text>
    <text x="1388" y="262" class="nodeTitle">Public EC2 x2</text>
    <text x="1388" y="284" class="nodeSub">qa-ec2-public-1, qa-ec2-public-2</text>
  </g>

  <g>
    <rect x="1330" y="365" width="370" height="110" class="node" />
    <rect x="1344" y="389" width="34" height="34" class="icon ec2" />
    <text x="1361" y="410" text-anchor="middle" class="iconText">EC2</text>
    <text x="1388" y="407" class="nodeTitle">Private EC2 x2</text>
    <text x="1388" y="429" class="nodeSub">qa-ec2-private-1, qa-ec2-private-2</text>
  </g>

  <rect x="820" y="590" width="910" height="340" class="sec-orch" />
  <text x="1275" y="620" text-anchor="middle" class="sectionLabel">QA Terraform Orchestration (env/qa)</text>

  <g>
    <rect x="850" y="660" width="190" height="95" class="node" />
    <rect x="864" y="680" width="32" height="32" class="icon tf" />
    <text x="880" y="701" text-anchor="middle" class="iconText">TF</text>
    <text x="907" y="697" class="nodeTitle">Terraform Root</text>
    <text x="907" y="719" class="nodeSub">main.tf / provider.tf</text>
  </g>

  <g>
    <rect x="1080" y="630" width="180" height="84" class="node" />
    <rect x="1094" y="648" width="30" height="30" class="icon mod" />
    <text x="1109" y="668" text-anchor="middle" class="iconText">MOD</text>
    <text x="1135" y="666" class="nodeTitle">VPC Module</text>
    <text x="1135" y="688" class="nodeSub">modules/vpc</text>
  </g>

  <g>
    <rect x="1080" y="740" width="180" height="84" class="node" />
    <rect x="1094" y="758" width="30" height="30" class="icon mod" />
    <text x="1109" y="778" text-anchor="middle" class="iconText">MOD</text>
    <text x="1135" y="776" class="nodeTitle">SG Module</text>
    <text x="1135" y="798" class="nodeSub">modules/sg</text>
  </g>

  <g>
    <rect x="1300" y="620" width="210" height="90" class="node" />
    <rect x="1314" y="640" width="30" height="30" class="icon mod" />
    <text x="1329" y="660" text-anchor="middle" class="iconText">MOD</text>
    <text x="1355" y="657" class="nodeTitle">EC2 Public Module</text>
    <text x="1355" y="679" class="nodeSub">count = 2</text>
  </g>

  <g>
    <rect x="1300" y="735" width="210" height="90" class="node" />
    <rect x="1314" y="755" width="30" height="30" class="icon mod" />
    <text x="1329" y="775" text-anchor="middle" class="iconText">MOD</text>
    <text x="1355" y="772" class="nodeTitle">EC2 Private Module</text>
    <text x="1355" y="794" class="nodeSub">count = 2</text>
  </g>

  <g>
    <rect x="1540" y="675" width="160" height="90" class="node" />
    <rect x="1554" y="695" width="30" height="30" class="icon out" />
    <text x="1569" y="715" text-anchor="middle" class="iconText">OUT</text>
    <text x="1595" y="712" class="nodeTitle">Outputs</text>
    <text x="1595" y="734" class="nodeSub">Public/Private IPs</text>
  </g>

  <line x1="130" y1="363" x2="130" y2="390" class="lineGray" />
  <line x1="210" y1="430" x2="360" y2="236" class="lineBlue" />
  <path d="M 210 438 C 460 520, 640 620, 850 708" class="lineBlue" />

  <line x1="535" y1="220" x2="565" y2="220" class="lineGreen" />
  <line x1="535" y1="250" x2="565" y2="340" class="lineGreen" />

  <line x1="940" y1="266" x2="940" y2="295" class="lineGray" />
  <line x1="940" y1="266" x2="940" y2="410" class="lineGray" />

  <line x1="1030" y1="340" x2="1330" y2="275" class="lineBlue" />
  <line x1="1030" y1="455" x2="1330" y2="420" class="lineBlue" />
  <line x1="1230" y1="340" x2="1330" y2="275" class="lineGray" />
  <line x1="1230" y1="340" x2="1330" y2="420" class="lineGray" />

  <line x1="1040" y1="708" x2="1080" y2="672" class="lineBlue" />
  <line x1="1040" y1="708" x2="1080" y2="782" class="lineBlue" />
  <line x1="1040" y1="708" x2="1300" y2="665" class="lineBlue" />
  <line x1="1040" y1="708" x2="1300" y2="780" class="lineBlue" />

  <line x1="1510" y1="665" x2="1540" y2="720" class="lineGray" />
  <line x1="1510" y1="780" x2="1540" y2="720" class="lineGray" />

  <line x1="1170" y1="630" x2="940" y2="266" class="lineBlue" />
  <line x1="1170" y1="740" x2="1140" y2="385" class="lineBlue" />
  <line x1="1405" y1="620" x2="1515" y2="330" class="lineBlue" />
  <line x1="1405" y1="735" x2="1515" y2="475" class="lineBlue" />

  <path d="M 945 662 C 850 560, 780 400, 745 225" class="lineRedDashed" />
  <text x="800" y="500" class="small">remote state</text>

  <path d="M 955 688 C 860 610, 790 500, 745 340" class="lineRedDashed" />
  <text x="810" y="585" class="small">state lock</text>

  <text x="1275" y="955" text-anchor="middle" class="small">Current EC2 distribution in QA: 2 public + 2 private</text>
</svg>
