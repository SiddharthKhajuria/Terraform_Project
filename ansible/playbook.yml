- name: Bootstrap EC2 with python3 and deploy app container
  hosts: qa_public
  become: true
  gather_facts: false

  vars:
    default_repo_url: https://github.com/SiddharthKhajuria/portfolio-app.git
    default_repo_branch: main
    default_app_directory: /opt/portfolio-app
    default_image_name: portfolio-app:latest
    default_container_name: portfolio-app
    default_host_port: 8080
    default_container_port: 8080
    docker_package_by_distribution:
      Ubuntu: docker.io
      Debian: docker.io
      Amazon: docker
      RedHat: docker
      CentOS: docker
      Rocky: docker
      AlmaLinux: docker

  tasks:
    - name: Ensure python3 is installed (Amazon Linux)
      raw: test -e /usr/bin/python3 || sudo yum install -y python3

    - name: Ensure /usr/bin/python symlink exists (Amazon Linux)
      raw: test -e /usr/bin/python || sudo ln -s /usr/bin/python3 /usr/bin/python

    - name: Reset SSH connection to use python3
      meta: reset_connection

    - name: Gather facts
      setup:

    - name: Wait for SSH connectivity
      wait_for_connection:
        timeout: 300
        delay: 5

    - name: Refresh apt cache on Debian family
      apt:
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install Docker and Git (Amazon Linux)
      dnf:
        name:
          - "{{ docker_package_by_distribution[ansible_distribution] | default('docker') }}"
          - git
        state: present
      when: ansible_os_family == "RedHat" and ansible_distribution == "Amazon"

    - name: Install Docker and Git (other RedHat)
      yum:
        name:
          - "{{ docker_package_by_distribution[ansible_distribution] | default('docker') }}"
          - git
        state: present
      when: ansible_os_family == "RedHat" and ansible_distribution != "Amazon"

    - name: Install Docker and Git (Debian)
      apt:
        name:
          - docker.io
          - git
        state: present
      when: ansible_os_family == "Debian"

    - name: Update apt cache (Debian)
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Enable and start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add remote user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Clone or update application repository
      git:
        repo: "{{ app_repo_url | default(default_repo_url) }}"
        dest: "{{ app_directory | default(default_app_directory) }}"
        version: "{{ app_repo_branch | default(default_repo_branch) }}"
        update: true
        force: true

    - name: Build application image
      command: "docker build -t {{ app_image_name | default(default_image_name) }} ."
      args:
        chdir: "{{ app_directory | default(default_app_directory) }}"
      changed_when: true

    - name: Remove existing container if present
      command: "docker rm -f {{ app_container_name | default(default_container_name) }}"
      register: remove_container
      failed_when: remove_container.rc not in [0, 1]
      changed_when: remove_container.rc == 0

    - name: Run application container
      command: >-
        docker run -d
        --name {{ app_container_name | default(default_container_name) }}
        --restart unless-stopped
        -p {{ app_host_port | default(default_host_port) }}:{{ app_container_port | default(default_container_port) }}
        {{ app_image_name | default(default_image_name) }}
      register: run_container
      changed_when: run_container.rc == 0

    - name: Wait for app port to become available
      wait_for:
        host: 127.0.0.1
        port: "{{ app_host_port | default(default_host_port) }}"
        delay: 2
        timeout: 60

    - name: Show app endpoint
      debug:
        msg: "Application is available at http://{{ inventory_hostname }}:{{ app_host_port | default(default_host_port) }}"
